services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tgmarketplace
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: deps
    command: npm run dev
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    env_file: .env.local
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/tgmarketplace
    depends_on:
      db:
        condition: service_healthy

  bot:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: deps
    command: npx tsx scripts/run-bot.ts
    volumes:
      - .:/app
      - /app/node_modules
    env_file: .env.local
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/tgmarketplace
      BOT_MODE: polling
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
